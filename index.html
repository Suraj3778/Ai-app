<!DOCTYPE html>
<html>
<head>
    <title>AI Study Tool</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            background: #667eea;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
        }

        .nav-buttons button {
            margin-left: 10px;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .login-btn {
            background: white;
            color: #667eea;
        }

        .register-btn {
            background: #28a745;
            color: white;
        }

        /* MAIN */
        .container {
            display: flex;
            justify-content: center;
            margin-top: 80px;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }

        input {
            background: #f1f1f1;
        }

        button {
            background: #667eea;
            color: white;
        }

        .pay {
            background: #28a745;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">📚 AI Study Tool</div>

    <div class="nav-buttons">
        <button class="login-btn" onclick="login()">Login</button>
        <button class="register-btn" onclick="register()">Register</button>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <div class="card">
        <h2>Generate Notes</h2>
        <p>Upload file → Get exam-ready PDF</p>

        <input type="file" id="file">

        <button onclick="upload()">Generate PDF</button>

        <button class="pay" onclick="payNow()">💳 Pay ₹29</button>

        <div class="footer">⚡ Instant | 🎯 Exam Focused</div>
    </div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

const BASE_URL = "https://ai-app-production-170c.up.railway.app";

function saveUser(id) {
    localStorage.setItem("user_id", id);
}

function getUser() {
    return localStorage.getItem("user_id");
}

// REGISTER
async function register() {
    let email = prompt("Email");
    let password = prompt("Password");

    await fetch(BASE_URL + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    });

    alert("Registered! Now login");
}

// LOGIN
async function login() {
    let email = prompt("Email");
    let password = prompt("Password");

    let res = await fetch(BASE_URL + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    });

    let data = await res.json();

    if (data.status === "success") {
        saveUser(data.user_id);
        alert("Login success");
    } else {
        alert("Login failed");
    }
}

// UPLOAD
async function upload() {

    let userId = getUser();

    if (!userId) {
        alert("Login karo");
        return;
    }

    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("File select karo");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch(BASE_URL + "/upload", {
        method: "POST",
        headers: {"user_id": userId},
        body: formData
    });

    let blob = await res.blob();
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "notes.pdf";
    a.click();
}

// PAYMENT
async function payNow() {

    let userId = getUser();

    if (!userId) {
        alert("Login karo pehle");
        return;
    }

    let res = await fetch(BASE_URL + "/create-order", {
        method: "POST"
    });

    let order = await res.json();

    var options = {
        "key": "rzp_test_STXYkGXEsjoOlw",
        "amount": order.amount,
        "currency": "INR",
        "order_id": order.id,
        "handler": async function (response) {

            await fetch(BASE_URL + "/verify-payment", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    ...response,
                    user_id: userId
                })
            });

            alert("Payment success!");
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}

</script>

</body>
</html>
