<!DOCTYPE html>
<html>
<head>
    <title>AI Study Tool</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            background: #667eea;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .nav-buttons button {
            margin-left: 10px;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .login-btn {
            background: white;
            color: #667eea;
        }

        .register-btn {
            background: #28a745;
            color: white;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .hero h1 {
            font-size: 32px;
        }

        .hero button {
            margin-top: 20px;
            padding: 12px 20px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        /* FEATURES */
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 50px;
        }

        .feature-box {
            background: white;
            padding: 20px;
            width: 200px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* APP SECTION */
        .app {
            display: flex;
            justify-content: center;
            margin: 50px 0;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }

        input {
            background: #f1f1f1;
        }

        button {
            background: #667eea;
            color: white;
        }

        .pay {
            background: #28a745;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>📚 AI Study Tool</div>
    <div class="nav-buttons">
        <button class="login-btn" onclick="login()">Login</button>
        <button class="register-btn" onclick="register()">Register</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Turn Your Notes into Exam Ready PDF</h1>
    <p>AI-powered tool to help you pass exams faster</p>
    <button onclick="scrollToApp()">Start Now</button>
</div>

<!-- FEATURES -->
<div class="features">
    <div class="feature-box">
        ⚡ Instant PDF
    </div>
    <div class="feature-box">
        🎯 Exam Focused
    </div>
    <div class="feature-box">
        🤖 AI Powered
    </div>
</div>

<!-- APP -->
<div class="app" id="app">
    <div class="card">
        <h2>Generate Notes</h2>

        <input type="file" id="file">

        <button onclick="upload()">Generate PDF</button>

        <button class="pay" onclick="payNow()">💳 Pay ₹29</button>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

const BASE_URL = "https://ai-app-production-170c.up.railway.app";

function scrollToApp() {
    document.getElementById("app").scrollIntoView({behavior: "smooth"});
}

function saveUser(id) {
    localStorage.setItem("user_id", id);
}

function getUser() {
    return localStorage.getItem("user_id");
}

async function register() {
    let email = prompt("Email");
    let password = prompt("Password");

    await fetch(BASE_URL + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    });

    alert("Registered! Now login");
}

async function login() {
    let email = prompt("Email");
    let password = prompt("Password");

    let res = await fetch(BASE_URL + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    });

    let data = await res.json();

    if (data.status === "success") {
        saveUser(data.user_id);
        alert("Login success");
    } else {
        alert("Login failed");
    }
}

async function upload() {

    let userId = getUser();

    if (!userId) {
        alert("Login karo");
        return;
    }

    let file = document.getElementById("file").files[0];

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch(BASE_URL + "/upload", {
        method: "POST",
        headers: {"user_id": userId},
        body: formData
    });

    let blob = await res.blob();
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "notes.pdf";
    a.click();
}

async function payNow() {

    let userId = getUser();

    if (!userId) {
        alert("Login karo pehle");
        return;
    }

    let res = await fetch(BASE_URL + "/create-order", {
        method: "POST"
    });

    let order = await res.json();

    var options = {
        "key": "rzp_test_STXYkGXEsjoOlw",
        "amount": order.amount,
        "currency": "INR",
        "order_id": order.id,
        "handler": async function (response) {

            await fetch(BASE_URL + "/verify-payment", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    ...response,
                    user_id: userId
                })
            });

            alert("Payment success!");
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}

</script>

</body>
</html>
