<!DOCTYPE html>
<html>
<head>
    <title>AI Study Tool</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        input {
            background: #f1f1f1;
        }

        button {
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        .pay {
            background: #28a745;
        }

        .small {
            font-size: 12px;
            color: gray;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📚 AI Study Tool</h2>
    <p>Exam-ready notes in seconds</p>

    <input type="file" id="file">

    <button onclick="upload()">Generate PDF</button>

    <button class="pay" onclick="payNow()">💳 Unlock (₹29)</button>

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>

    <div class="small">⚡ Instant | 🎯 Smart Notes</div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const BASE_URL = "https://ai-app-production-170c.up.railway.app";

// -------- USER STORAGE --------
function saveUser(id) {
    localStorage.setItem("user_id", id);
}

function getUser() {
    return localStorage.getItem("user_id");
}

// -------- REGISTER --------
async function register() {

    let email = prompt("Enter Email");
    let password = prompt("Enter Password");

    let res = await fetch(BASE_URL + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    });

    let data = await res.json();

    if (data.status === "registered") {
        alert("Registered! Now login");
    } else {
        alert("User already exists");
    }
}

// -------- LOGIN --------
async function login() {

    let email = prompt("Enter Email");
    let password = prompt("Enter Password");

    let res = await fetch(BASE_URL + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    });

    let data = await res.json();

    if (data.status === "success") {
        saveUser(data.user_id);
        alert("Login Success");
    } else {
        alert("Login Failed");
    }
}

// -------- UPLOAD --------
async function upload() {

    let userId = getUser();

    if (!userId) {
        alert("Pehle login karo");
        return;
    }

    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("File select karo");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch(BASE_URL + "/upload", {
        method: "POST",
        headers: {
            "user_id": userId
        },
        body: formData
    });

    let blob = await res.blob();

    let url = window.URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "notes.pdf";
    a.click();
}

// -------- PAYMENT --------
async function payNow() {

    let userId = getUser();

    if (!userId) {
        alert("Login karo pehle");
        return;
    }

    let res = await fetch(BASE_URL + "/create-order", {
        method: "POST"
    });

    let order = await res.json();

    var options = {
        "key": "rzp_test_STXYkGXEsjoOlw",
        "amount": order.amount,
        "currency": "INR",
        "name": "AI Study Tool",
        "order_id": order.id,
        "handler": async function (response) {

            await fetch(BASE_URL + "/verify-payment", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    ...response,
                    user_id: userId
                })
            });

            alert("✅ Payment Success! Now upload file");
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}
</script>

</body>
</html>
